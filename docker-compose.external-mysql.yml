services:
  iptv-all-in-one:
    image: juzhic/iptv-all-in-one:latest
    container_name: iptv-all-in-one
    command: ["gunicorn", "-w", "1", "--worker-class", "gthread", "--threads", "8", "-b", "0.0.0.0:58080", "--timeout", "120", "web:app"]
    ports:
      - "${PORT:-58080}:58080"
    environment:
      - DB_HOST=${DB_HOST:?Please set DB_HOST in .env}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_NAME=${DB_NAME:-iptv-all-in-one}
      - DB_CHARSET=${DB_CHARSET:-utf8mb4}
      - TZ=Asia/Shanghai
    restart: unless-stopped
